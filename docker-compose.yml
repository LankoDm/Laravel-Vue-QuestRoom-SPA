services:
  frontend:
    image: node:20-alpine
    container_name: quest_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quest_backend
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "composer install && php artisan storage:link && php artisan serve --host=0.0.0.0 --port=8080"

  reverb:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quest_reverb
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    ports:
      - "8081:8081"
    depends_on:
      - backend
    command: php artisan reverb:start --host="0.0.0.0" --port=8081

  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quest_queue
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - backend
    command: php artisan queue:work redis --tries=3 --timeout=90

  mysql:
    image: mysql:8.4
    container_name: quest_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: questroom
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-proot"]
      retries: 3
      timeout: 5s

  redis:
    image: redis:alpine
    container_name: quest_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      retries: 3
      timeout: 5s

volumes:
  mysql_data:
  redis_data:
